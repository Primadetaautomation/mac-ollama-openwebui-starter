name: Validate Compose

on:
  push:
  pull_request:

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Validate mac compose
        run: docker compose -f mac-ollama-openwebui-starter/compose.webui-mac.yml config

      - name: Validate all-in-one compose
        run: docker compose -f mac-ollama-openwebui-starter/compose.all-in-one.yml config

