services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:${OLLAMA_PORT:-11434}}
      # Voor strengere CORS in productie, zet expliciet de origin i.p.v. '*'
      # - CORS_ALLOW_ORIGIN=http://localhost:${WEBUI_PORT:-3000}
    volumes:
      - openwebui-data:/app/backend/data

volumes:
  openwebui-data:

